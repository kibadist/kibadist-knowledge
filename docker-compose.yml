services:
  db:
    # pgvector image (PostgreSQL 16 + the `vector` extension). Drop-in for the
    # previous postgres:16-alpine — same PG major, so the data volume is reused.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kibadist
    volumes:
      - kibadist_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d kibadist']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kibadist_pgdata:
